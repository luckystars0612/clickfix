<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập Quản trị — ClickFix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at center, #1e2030 0%, #0c0d14 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      color: #fff;
    }

    /* Ambient background glows */
    .glow-1 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(99, 102, 241, 0) 70%);
      top: -100px;
      left: -100px;
      z-index: 0;
      pointer-events: none;
    }

    .glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(244, 129, 32, 0.1) 0%, rgba(244, 129, 32, 0) 70%);
      bottom: -150px;
      right: -150px;
      z-index: 0;
      pointer-events: none;
    }

    /* Glassmorphism login container */
    .login-card {
      background: rgba(18, 20, 32, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      width: 100%;
      max-width: 380px;
      padding: 40px 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      text-align: center;
      z-index: 10;
      position: relative;
    }

    /* Shaking animation on wrong code */
    .shake {
      animation: cardShake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes cardShake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }

    .logo-area {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.35);
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13.5px;
      color: #94a3b8;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    /* Secret PIN Dots styling instead of plain input */
    .pin-display-dots {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dot.active {
      background: #6366f1;
      border-color: #6366f1;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.6);
      transform: scale(1.15);
    }

    .dot.error {
      border-color: #ef4444;
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
    }

    /* Invisible Input */
    #pin-hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      top: 0;
      left: 0;
    }

    /* Error Badge */
    .error-badge {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 12.5px;
      margin-top: -16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Visual Keypad UI */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 260px;
      margin: 0 auto;
    }

    .key {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: #e2e8f0;
      font-size: 20px;
      font-weight: 500;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin: 0 auto;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      user-select: none;
    }

    .key:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .key:active {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.5);
      color: #a5b4fc;
      transform: scale(0.92);
    }

    .key.action-key {
      font-size: 13px;
      font-weight: 600;
      color: #94a3b8;
      border: none;
      background: transparent;
    }
    
    .key.action-key:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.04);
    }

    .key.action-key:active {
      color: #a5b4fc;
      background: rgba(99, 102, 241, 0.15);
    }

    /* Back home link */
    .home-link {
      display: inline-block;
      margin-top: 32px;
      font-size: 12.5px;
      color: #64748b;
      text-decoration: none;
      transition: color 0.2s;
    }

    .home-link:hover {
      color: #94a3b8;
    }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Form uses POST method to submit to /admin/login -->
  <form id="login-form" action="/admin/login" method="POST">
    <div class="login-card {% if error %}shake{% endif %}" id="card">
      <div class="logo-area">🔒</div>
      
      <h1 class="title">ClickFix Admin</h1>
      <p class="subtitle">Vui lòng nhập mã PIN bảo mật để truy cập bảng điều khiển.</p>

      {% if error %}
      <div class="error-badge">
        <span>⚠️</span> Mã PIN nhập không chính xác
      </div>
      {% endif %}

      <!-- Dots display (represents PIN entry) -->
      <div class="pin-display-dots" id="dots-container">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- Hidden standard password input for browser/form compliance -->
      <input type="password" name="pin" id="pin-hidden-input" autocomplete="current-password" autofocus maxlength="6">

      <!-- Visual keypad -->
      <div class="keypad">
        <div class="key" data-val="1">1</div>
        <div class="key" data-val="2">2</div>
        <div class="key" data-val="3">3</div>
        <div class="key" data-val="4">4</div>
        <div class="key" data-val="5">5</div>
        <div class="key" data-val="6">6</div>
        <div class="key" data-val="7">7</div>
        <div class="key" data-val="8">8</div>
        <div class="key" data-val="9">9</div>
        <div class="key action-key" id="btn-clear">XÓA</div>
        <div class="key" data-val="0">0</div>
        <div class="key action-key" id="btn-back">⌫</div>
      </div>

      <a href="/" class="home-link">← Quay lại trang chủ</a>
    </div>
  </form>

  <script>
    const maxDigits = 6;
    const hiddenInput = document.getElementById('pin-hidden-input');
    const dots = document.querySelectorAll('.dot');
    const form = document.getElementById('login-form');
    const card = document.getElementById('card');

    // Keep hidden input focused for keyboard entry
    document.addEventListener('click', () => {
      hiddenInput.focus();
    });

    // Ensure hidden input is focused on load
    window.onload = () => {
      hiddenInput.focus();
    };

    // Handle typing in hidden input
    hiddenInput.addEventListener('input', (e) => {
      // Allow only numbers
      hiddenInput.value = hiddenInput.value.replace(/[^0-9]/g, '');
      updateDots();

      // Submit automatically if PIN reaches maximum digits (e.g. 6)
      if (hiddenInput.value.length === maxDigits) {
        submitPIN();
      }
    });

    // Function to update the visual dots
    function updateDots() {
      const valLen = hiddenInput.value.length;
      dots.forEach((dot, index) => {
        if (index < valLen) {
          dot.classList.add('active');
        } else {
          dot.classList.remove('active');
        }
      });
    }

    // Handle visual keypad clicks
    document.querySelectorAll('.key[data-val]').forEach(key => {
      key.addEventListener('click', (e) => {
        e.preventDefault();
        if (hiddenInput.value.length < maxDigits) {
          hiddenInput.value += key.dataset.val;
          updateDots();
          
          if (hiddenInput.value.length === maxDigits) {
            submitPIN();
          }
        }
      });
    });

    // Handle Clear button
    document.getElementById('btn-clear').addEventListener('click', (e) => {
      e.preventDefault();
      hiddenInput.value = '';
      updateDots();
    });

    // Handle Backspace button
    document.getElementById('btn-back').addEventListener('click', (e) => {
      e.preventDefault();
      hiddenInput.value = hiddenInput.value.slice(0, -1);
      updateDots();
    });

    function submitPIN() {
      // Short delay for visual feedback before submit
      setTimeout(() => {
        form.submit();
      }, 200);
    }

    // Remove shake class after animation completes
    if (card.classList.contains('shake')) {
      setTimeout(() => {
        card.classList.remove('shake');
      }, 500);
      
      // Mark dots as error temporarily
      dots.forEach(dot => dot.classList.add('error'));
      setTimeout(() => {
        dots.forEach(dot => dot.classList.remove('error'));
      }, 1000);
    }
  </script>
</body>
</html>
